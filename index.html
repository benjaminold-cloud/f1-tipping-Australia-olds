<!DOCTYPE html>
<html>
<head>
  <title>Old's F1 Tipping</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:Arial;background:#111;color:white;text-align:center">

<h1>🏁 Old's F1 Tipping</h1>

<div id="login">
<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<h2>Submit Your Tip</h2>

<select id="p1"></select>
<select id="p2"></select>
<select id="p3"></select>
<select id="piastri"></select>

<br><br>

<button onclick="submitTip()">Submit Tip</button>

<h2>Leaderboard</h2>
<div id="leaderboard"></div>

</div>

<script>

const SUPABASE_URL = "https://qmbiiwsztevcyovywqb.supabase.co"
const SUPABASE_KEY = "sb_publishable_lDoAE1D6_O52BM-e4GF9zg_u93d98m0"

const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

const drivers = [
"Verstappen","Perez","Leclerc","Sainz",
"Hamilton","Russell",
"Norris","Piastri",
"Alonso","Stroll",
"Ocon","Gasly",
"Albon","Sargeant",
"Bottas","Zhou",
"Tsunoda","Ricciardo",
"Hulkenberg","Magnussen"
]

function populateDrivers(){
drivers.forEach(d=>{
["p1","p2","p3","piastri"].forEach(id=>{
let opt=document.createElement("option")
opt.value=d
opt.text=d
document.getElementById(id).appendChild(opt)
})
})
}

populateDrivers()

async function signup(){
const email=document.getElementById("email").value
const password=document.getElementById("password").value

await supabase.auth.signUp({email,password})

alert("Account created")
}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data}=await supabase.auth.signInWithPassword({email,password})

if(data){
document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"
loadLeaderboard()
}

}

async function submitTip(){

const user=await supabase.auth.getUser()

const p1=document.getElementById("p1").value
const p2=document.getElementById("p2").value
const p3=document.getElementById("p3").value
const piastri=document.getElementById("piastri").value

await supabase.from("tips").insert({
user_id:user.data.user.id,
p1,p2,p3,piastri
})

alert("Tip submitted")

}

async function loadLeaderboard(){

const {data}=await supabase.from("scores").select("*")

let html=""

data.forEach(r=>{
html+=`${r.user_email} - ${r.points}<br>`
})

document.getElementById("leaderboard").innerHTML=html

}

</script>

</body>
</html>
